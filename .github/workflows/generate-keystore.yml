name: Generate Keystore (Run Once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore eagle-dash.keystore \
            -alias eagle-dash \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass EagleDash2026! \
            -keypass EagleDash2026! \
            -dname "CN=Eagle Dash, OU=Games, O=SJ Unlock, L=Kingston, ST=Kingston, C=JM"

      - name: Print base64 (copy this to GitHub secret KEYSTORE_BASE64)
        run: |
          echo "====== COPY EVERYTHING BETWEEN THE LINES ======"
          base64 -w 0 eagle-dash.keystore
          echo ""
          echo "====== END ======"
          echo ""
          echo "Passwords to save:"
          echo "KEYSTORE_PASSWORD = EagleDash2026!"
          echo "KEY_ALIAS         = eagle-dash"
          echo "KEY_PASSWORD      = EagleDash2026!"
